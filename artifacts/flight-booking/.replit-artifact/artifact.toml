kind = "web"
previewPath = "/"
title = "SkyReserve"
version = "1.0.0"
id = "artifacts/flight-booking"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21049

[services.development]
run = "pnpm --filter @workspace/flight-booking run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flight-booking", "run", "build" ]
serve = "static"
publicDir = "artifacts/flight-booking/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21049"
BASE_PATH = "/"
