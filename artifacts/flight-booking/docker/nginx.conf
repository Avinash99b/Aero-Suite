server {
  listen ${PORT};
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # config.js is regenerated per-container-start; never let it (or the HTML
  # shell) be cached, so runtime env changes take effect on next reload.
  location = /config.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files /config.js =404;
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Hashed build assets can be cached aggressively.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # SPA fallback for client-side routing.
  location / {
    try_files $uri /index.html;
  }
}
